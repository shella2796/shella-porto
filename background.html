<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shella Waramena | Portfolio</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;600&display=swap" rel="stylesheet" />
  <style>
    html, body {
      margin: 0;
      padding: 0;
      font-family: 'Inter', sans-serif;
      background: #eaf0f6;
      color: #222;
      height: 100%;
      overflow-x: hidden;
    }
    #particles-js {
      position: fixed;
      width: 100vw;
      height: 100vh;
      z-index: -1;
      top: 0;
      left: 0;
    }
    main {
      position: relative;
      padding: 2rem;
      z-index: 1;
    }
    h1 {
      font-size: 2rem;
      margin-bottom: 1rem;
    }
    ul {
      padding-left: 1.2rem;
    }
    a {
      color: #1d3557;
    }
  </style>
</head>

<body>

<div id="particles-js"></div>
<script src="particles.min.js"></script>
<script>
  particlesJS("particles-js", {
    particles: {
      number: { value: 50 },
      color: { value: "#aaaaaa" },
      shape: { type: "circle" },
      opacity: { value: 0.3, random: true },
      size: { value: 4, random: true },
      line_linked: {
        enable: true,
        distance: 150,
        color: "#cccccc",
        opacity: 0.4,
        width: 1
      },
      move: { enable: true, speed: 1.6 }
    },
    interactivity: {
      detect_on: "canvas",
      events: {
        onhover: { enable: true, mode: "repulse" },
        onclick: { enable: true, mode: "push" }
      },
      modes: {
        repulse: { distance: 100 },
        push: { particles_nb: 4 }
      }
    },
    retina_detect: true
  });
</script>

<main>
  <h1>Educational Background</h1>
  <ul>
    <li><strong>Magister of Computer Science</strong> – Universitas Pamulang (2021)</li>
    <li><strong>Bachelor of Computer Science</strong> – Universitas Pamulang (2017), GPA: 3.51</li>
  </ul>
</main>
</body></html>
