<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shella Waramena | Portfolio</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;600&amp;display=swap" rel="stylesheet" />
  <style>
    html, body {
      margin: 0;
      padding: 0;
      font-family: 'Inter', sans-serif;
      background: #eaf0f6;
      color: #222;
      height: 100%;
      overflow-x: hidden;
    }
    .particles {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: -1;
    }
    header {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 0 1rem;
    }
    h1 {
      font-size: 3rem;
      margin: 0.5rem 0;
    }
    p.tagline {
      font-size: 1.2rem;
      margin-bottom: 2rem;
    }
    nav a {
      display: inline-block;
      margin: 0 1rem;
      padding: 0.75rem 1.5rem;
      background-color: #1d3557;
      color: #fff;
      text-decoration: none;
      border-radius: 6px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div id="particles-js" class="particles"></div>
  <header>
    <h1>Shella Waramena</h1>
    <p class="tagline">Digital Project Manager</p>
    <nav>
      <a href="#work">Work</a>
      <a href="#background">Background</a>
      <a href="#contact">Contact</a>
    </nav>
  </header>

  <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
  <script>
    particlesJS("particles-js", {
      particles: {
        number: { value: 40 },
        color: { value: "#999" },
        shape: { type: "triangle" },
        opacity: { value: 0.3 },
        size: { value: 5 },
        line_linked: {
          enable: true,
          distance: 150,
          color: "#aaa",
          opacity: 0.3,
          width: 1
        },
        move: { enable: true, speed: 2 }
      },
      interactivity: {
        detect_on: "canvas",
        events: {
          onhover: { enable: true, mode: "repulse" },
          onclick: { enable: true, mode: "push" }
        },
        modes: {
          repulse: { distance: 100 },
          push: { particles_nb: 4 }
        }
      },
      retina_detect: true
    });
  </script>
</body>
</html>
